name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/wearesyntesa/gpu-platform

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Extract version metadata
        id: meta
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          MAJOR_MINOR="$(echo "$VERSION" | cut -d. -f1,2)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REVISION="$(git rev-parse HEAD)"
          SHORT_REVISION="$(git rev-parse --short HEAD)"
          
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"
          echo "revision=${REVISION}" >> "$GITHUB_OUTPUT"
          echo "short_revision=${SHORT_REVISION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.major_minor }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ steps.meta.outputs.short_revision }}
          labels: |
            org.opencontainers.image.title=RPL GPU Platform
            org.opencontainers.image.description=RPL GPU notebook control plane
            org.opencontainers.image.vendor=WeAreSyntesa
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.revision }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            APP_REVISION=${{ steps.meta.outputs.revision }}
            APP_BUILD_TIME=${{ steps.meta.outputs.build_time }}

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -A1 "${{ steps.meta.outputs.tag_name }}" | tail -1)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" "${PREV_TAG}".."${{ steps.meta.outputs.tag_name }}")
          else
            NOTES=$(git log --pretty=format:"- %s" "${{ steps.meta.outputs.tag_name }}")
          fi
          
          cat > release_notes.md <<EOF
          ## Changes
          
          ${NOTES}
          
          ## Docker Image
          
          \`\`\`bash
          docker pull ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          \`\`\`
          
          Available tags:
          - \`${{ steps.meta.outputs.version }}\` (this release)
          - \`${{ steps.meta.outputs.major_minor }}\` (latest ${{ steps.meta.outputs.major_minor }}.x)
          - \`latest\` (latest stable)
          - \`sha-${{ steps.meta.outputs.short_revision }}\` (commit-specific)
          EOF
          
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.notes_file }}
          draft: false
          prerelease: false
