name: Publish Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.3.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/wearesyntesa/gpu-platform

jobs:
  publish-image:
    name: Publish GHCR Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set release metadata
        id: release
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          MAJOR_MINOR="$(printf '%s' "$VERSION" | cut -d. -f1,2)"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          REVISION="$(git rev-parse HEAD)"
          SHORT_REVISION="$(git rev-parse --short HEAD)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"
          echo "revision=${REVISION}" >> "$GITHUB_OUTPUT"
          echo "short_revision=${SHORT_REVISION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.release.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.release.outputs.major_minor }}
            ${{ env.IMAGE_NAME }}:sha-${{ steps.release.outputs.short_revision }}
          labels: |
            org.opencontainers.image.title=RPL GPU Platform
            org.opencontainers.image.description=RPL GPU notebook control plane
            org.opencontainers.image.vendor=WeAreSyntesa
          build-args: |
            APP_VERSION=${{ steps.release.outputs.version }}
            APP_REVISION=${{ steps.release.outputs.revision }}
            APP_BUILD_TIME=${{ steps.release.outputs.build_time }}
